# .agentgate.yaml — project configuration for agentgate skill sync
#
# This is agentgate's own config. Unlike consumer projects (which run agentgate/sync.sh),
# this repo runs sync as ./sync.sh — agentgate is not a submodule of itself.
#
# See config.schema.yaml for documentation on each placeholder.

# Which agent adapters to generate skills for.
# Available: claude, cursor
adapters:
  - claude

# Placeholder values substituted into skill files during sync.
# Remove any you don't need; sync.sh will warn about unresolved placeholders.
config:
  INTEGRATION_BRANCH: development
  DEV_CMD: make dev
  ABANDON_CMD: make abandon
  CHECK_CMD: make check
  MERGE_CMD: make merge
  DEPLOY_PREVIEW_CMD: make deploy-preview
  DEPLOY_PROD_CMD: make deploy-prod
  VERSION_READ_CMD: "cat VERSION"
  BUMP_PATCH_CMD: make bump-patch
  BUMP_MINOR_CMD: make bump-minor
  BUMP_MAJOR_CMD: make bump-major
  SET_VERSION_CMD: "make set-version V="
  REVIEW_AGENT_PROMPT: .claude/review-agent-prompt.md
