# config.schema.yaml — canonical list of all {{PLACEHOLDERS}} used in skills/
#
# Each entry documents: description, default value, category, and which skills use it.
# Copy templates/codecannon.yaml to .codecannon.yaml in your project and fill these in.
#
# Naming policy for new placeholders:
#   Prefix by category to avoid crowding the flat namespace:
#     branches:  BRANCH_PROD, BRANCH_DEV, BRANCH_TEST, ...
#     workflow:  DEV_CMD, CHECK_CMD, MERGE_CMD, ...
#     version:   BUMP_PATCH_CMD, VERSION_READ_CMD, ...
#     paths:     REVIEW_AGENT_PROMPT, ...
#   Example future additions: GH_PROJECT_ID (GitHub-specific)

placeholders:

  # ── Branch names ──────────────────────────────────────────────────────────

  BRANCH_PROD:
    description: >
      Production branch. Defaults to "main". Change if your production branch has
      a different name (e.g. "master", "prod"). All release promotion targets this branch.
    default: "main"
    category: branches
    used_in: [submit-for-review, deploy]

  BRANCH_DEV:
    description: >
      Development/integration branch. Leave empty for trunk-based development (feature → BRANCH_PROD directly).
      Set to enable two-branch mode (feature → BRANCH_DEV → BRANCH_PROD). Common values: "development", "dev", "staging".
    default: ""
    category: branches
    used_in: [submit-for-review, deploy, qa, review-agent]

  BRANCH_TEST:
    description: >
      Test/staging branch for three-branch workflows (feature → BRANCH_DEV → BRANCH_TEST → BRANCH_PROD).
      Leave empty unless your team has a distinct test environment between dev and production.
      Requires BRANCH_DEV to be set. When set, /deploy runs from this branch and promotes
      it to BRANCH_PROD. The BRANCH_DEV → BRANCH_TEST promotion step is a manual PR
      or future /promote skill.
    default: ""
    category: branches
    used_in: [deploy]

  # ── Workflow commands ──────────────────────────────────────────────────────

  REVIEW_GATE:
    description: >
      Controls the AI code review step in /submit-for-review.
      "ai" (default): review agent is spawned and its verdict determines merge/reject.
      "advisory": review agent is spawned and posts findings, but /submit-for-review merges regardless of verdict.
      "off": no review agent is spawned; /submit-for-review merges immediately after CHECK_CMD passes.
    default: "ai"
    category: workflow
    used_in: [submit-for-review, review]

  DEV_CMD:
    description: "Start the local development server"
    default: "make dev"
    category: workflow
    used_in: [start]

  ABANDON_CMD:
    description: "Discard all changes and delete the current feature branch"
    default: "make abandon"
    category: workflow
    used_in: [start]

  CHECK_CMD:
    description: "Type-check / lint gate that must pass before shipping"
    default: "make check"
    category: workflow
    used_in: [submit-for-review]

  MERGE_CMD:
    description: "Merge the current feature PR into the integration branch"
    default: "make merge"
    category: workflow
    used_in: [submit-for-review, deploy]

  DEPLOY_PREVIEW_CMD:
    description: "Deploy to the pre-production environment (BRANCH_DEV in two-branch mode, BRANCH_TEST in three-branch mode). Not used by /submit-for-review in trunk mode."
    default: "make deploy-preview"
    category: workflow
    used_in: [deploy]

  DEPLOY_PROD_CMD:
    description: "Build and deploy to production environment"
    default: "make deploy-prod"
    category: workflow
    used_in: [deploy]

  # ── Version bumping ────────────────────────────────────────────────────────

  VERSION_READ_CMD:
    description: "Command that prints the current version string"
    default: "node -p \"require('./package.json').version\""
    category: version
    used_in: [deploy]

  BUMP_PATCH_CMD:
    description: "Bump patch version, commit, and tag"
    default: "make bump-patch"
    category: version
    used_in: [deploy]

  BUMP_MINOR_CMD:
    description: "Bump minor version, commit, and tag"
    default: "make bump-minor"
    category: version
    used_in: [deploy]

  BUMP_MAJOR_CMD:
    description: "Bump major version, commit, and tag"
    default: "make bump-major"
    category: version
    used_in: [deploy]

  SET_VERSION_CMD:
    description: "Set an arbitrary version (value appended as argument by the skill)"
    default: "make set-version V="
    category: version
    used_in: [deploy]

  # ── Paths ──────────────────────────────────────────────────────────────────

  REVIEW_AGENT_PROMPT:
    description: "Path to the review agent prompt file (generated from skills/review-agent.md)"
    default: ".claude/review-agent-prompt.md"
    category: paths
    used_in: [submit-for-review, review, review-agent]

  # ── GitHub / PR settings ───────────────────────────────────────────────────

  DEFAULT_REVIEWERS:
    description: "Comma-separated GitHub handles or team slugs to add as PR reviewers (e.g. @alice,@bob,org/team-name). Leave empty to rely solely on CODEOWNERS or manual assignment."
    default: ""
    category: github
    used_in: [submit-for-review]

  TICKET_LABELS:
    description: "Comma-separated pool of label names the agent may apply to new issues created by /start (e.g. 'bug,enhancement,good first issue'). The agent selects 1–3 labels from this pool based on the task content — it does not apply all of them blindly. Leave empty to apply no labels by default. Per-invocation --label flag bypasses pool selection entirely and uses the given value verbatim."
    default: ""
    category: github
    used_in: [start]

  TICKET_LABEL_CREATION_ALLOWED:
    description: "Controls whether the agent may create new GitHub labels on-the-fly when no label in TICKET_LABELS fits the task. When 'false' (default), the agent is strictly constrained to the TICKET_LABELS pool — if nothing fits, it omits --label silently. When 'true', the agent may run 'gh label create' before applying a new label. Value is matched as a case-insensitive string."
    default: "false"
    category: github
    used_in: [start]

  DEFAULT_MILESTONE:
    description: "Milestone to apply to every new issue created by /start. Acts as an override: if set, /start uses this value without querying GitHub. If empty (the default), /start auto-detects from open milestones — using the single open milestone silently, or prompting when multiple exist. Accepts milestone names ('Sprint 4') or numbers (12). Names are case-sensitive on GitHub. Per-invocation --milestone flag takes precedence over this value."
    default: ""
    category: github
    used_in: [start]

  QA_READY_LABEL:
    description: "Label applied by /submit-for-review when a feature merges to BRANCH_DEV in two-branch mode, signaling it is ready for QA on the preview environment. In trunk and three-branch modes, /submit-for-review does not apply this label automatically. Only configure if you have an explicit QA gate for your integration branch environment."
    default: "ready-for-qa"
    category: github
    used_in: [submit-for-review, qa]

  QA_PASSED_LABEL:
    description: "Label applied by /qa when a feature passes QA review. Leave empty to skip label application."
    default: "qa-passed"
    category: github
    used_in: [qa]

  QA_FAILED_LABEL:
    description: "Label applied by /qa when a feature fails QA review. Leave empty to skip label application."
    default: "qa-failed"
    category: github
    used_in: [qa]

  # Note: adding issues to a GitHub Projects board requires `gh project item-add`, which needs
  # a project number or URL and an org slug — two additional placeholders, and gh project commands
  # behave differently across GitHub tiers and org settings. Project board placement is explicitly
  # out of scope for /start and remains a manual step or future extension.

  # ── Review agent content ───────────────────────────────────────────────────

  PLATFORM_COMPLIANCE_NOTES:
    description: "Platform-specific compliance rules injected into the review agent prompt (Platform Compliance section). Use a YAML block scalar for multi-line content."
    default: "<!-- No platform-specific compliance rules defined. Edit .codecannon.yaml to add them. -->"
    category: review
    used_in: [review-agent]

  CONVENTIONS_NOTES:
    description: "Project-specific conventions injected into the review agent prompt (Conventions section). Use a YAML block scalar for multi-line content."
    default: "<!-- No project conventions defined. Edit .codecannon.yaml to add them. -->"
    category: review
    used_in: [review-agent]
